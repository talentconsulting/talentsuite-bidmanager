name: Frontend Deploy (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/TalentSuite.FrontEnd/**"
      - "src/TalentSuite.Shared/**"
      - ".github/workflows/frontend-pages-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Blazor frontend
        run: dotnet publish src/TalentSuite.FrontEnd/TalentSuite.FrontEnd.csproj -c Release

      - name: Prepare Pages artifact
        run: |
          publish_dir="src/TalentSuite.FrontEnd/bin/Release/net10.0/publish/wwwroot"
          repo_name="${GITHUB_REPOSITORY#*/}"
          base_path="/${repo_name}/"

          sed -i "s#<base href=\"/\" />#<base href=\"${base_path}\" />#g" "${publish_dir}/index.html"
          cp "${publish_dir}/index.html" "${publish_dir}/404.html"
          touch "${publish_dir}/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/TalentSuite.FrontEnd/bin/Release/net10.0/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
