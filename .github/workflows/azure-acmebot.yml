name: Azure ACME Bot

on:
  workflow_dispatch:
    inputs:
      app_name_prefix:
        description: 'Prefix for ACME bot resources (e.g. talentsuite-dev)'
        required: true
        default: 'kvcertbot-dev'
        type: string
      mail_address:
        description: "Email address for ACME/Let's Encrypt notifications"
        required: true
        default: 'pablo.lorenzo@talentconsulting.uk'
        type: string
      acme_endpoint:
        description: 'ACME directory endpoint'
        required: true
        default: 'https://acme-v02.api.letsencrypt.org/'
        type: choice
        options:
          - 'https://acme-v02.api.letsencrypt.org/'
          - 'https://acme-staging-v02.api.letsencrypt.org/'
      create_with_key_vault:
        description: 'Create a new Key Vault alongside the ACME bot'
        required: true
        default: true
        type: boolean
      key_vault_sku_name:
        description: 'Key Vault SKU'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - premium

permissions:
  contents: read

jobs:
  deploy-acmebot:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate inputs
        run: |
          test -n "${AZURE_ENV_NAME:-}" || (echo "AZURE_ENV_NAME missing" && exit 1)
          test -n "${AZURE_LOCATION:-}" || (echo "AZURE_LOCATION missing" && exit 1)
          test -n "${{ github.event.inputs.app_name_prefix }}" || (echo "app_name_prefix missing" && exit 1)
          test -n "${{ github.event.inputs.mail_address }}" || (echo "mail_address missing" && exit 1)
          echo "Using Azure location: ${AZURE_LOCATION}"

      - name: Create Resource Group
        run: |
          az group create \
            --name "rg-kvcertbot-${AZURE_ENV_NAME}" \
            --location "${AZURE_LOCATION}"

      - name: Validate Bicep template
        run: |
          az deployment group validate \
            --resource-group "rg-kvcertbot-${AZURE_ENV_NAME}" \
            --template-file ./infra/acmebot/main.bicep \
            --parameters \
              appNamePrefix="${{ github.event.inputs.app_name_prefix }}" \
              mailAddress="${{ github.event.inputs.mail_address }}" \
              acmeEndpoint="${{ github.event.inputs.acme_endpoint }}" \
              createWithKeyVault=${{ github.event.inputs.create_with_key_vault }} \
              keyVaultSkuName="${{ github.event.inputs.key_vault_sku_name }}" \
            --output json

      - name: Deploy ACME Bot
        id: deploy
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME="acmebot-$(date +%Y%m%d%H%M%S)"
          echo "::group::az deployment group create"
          DEPLOY_OUTPUT="$(az deployment group create \
            --resource-group "rg-kvcertbot-${AZURE_ENV_NAME}" \
            --template-file ./infra/acmebot/main.bicep \
            --parameters \
              appNamePrefix="${{ github.event.inputs.app_name_prefix }}" \
              mailAddress="${{ github.event.inputs.mail_address }}" \
              acmeEndpoint="${{ github.event.inputs.acme_endpoint }}" \
              createWithKeyVault=${{ github.event.inputs.create_with_key_vault }} \
              keyVaultSkuName="${{ github.event.inputs.key_vault_sku_name }}" \
            --name "$DEPLOYMENT_NAME" \
            --output json 2>&1)" || {
            echo "::endgroup::"
            echo "::error::Deployment failed. Raw output below:"
            echo "$DEPLOY_OUTPUT"
            echo "::group::Deployment error details"
            az deployment group show \
              --resource-group "rg-kvcertbot-${AZURE_ENV_NAME}" \
              --name "$DEPLOYMENT_NAME" \
              --query '{state:properties.provisioningState,error:properties.error}' \
              --output json 2>/dev/null || true
            echo "::endgroup::"
            echo "::group::Operation-level errors"
            az deployment operation group list \
              --resource-group "rg-kvcertbot-${AZURE_ENV_NAME}" \
              --name "$DEPLOYMENT_NAME" \
              --query '[?properties.provisioningState==`Failed`].{resource:properties.targetResource.resourceType,status:properties.statusMessage}' \
              --output json 2>/dev/null || true
            echo "::endgroup::"
            exit 1
          }
          echo "::endgroup::"
          echo "::group::Full deployment output"
          echo "$DEPLOY_OUTPUT"
          echo "::endgroup::"
          function_app_name="$(echo "$DEPLOY_OUTPUT" | jq -r '.properties.outputs.functionAppName.value // empty')"
          if [ -z "$function_app_name" ]; then
            echo "::error::Deployment succeeded but returned no functionAppName output"
            echo "Available outputs:"
            echo "$DEPLOY_OUTPUT" | jq '.properties.outputs'
            exit 1
          fi
          echo "function_app_name=$function_app_name" >> "$GITHUB_OUTPUT"
          echo "deployment_name=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "Deployed ACME bot: $function_app_name"

      - name: Show ACME Bot Function App URL
        run: |
          echo "Function App: ${{ steps.deploy.outputs.function_app_name }}"
          az functionapp show \
            --resource-group "rg-kvcertbot-${AZURE_ENV_NAME}" \
            --name "${{ steps.deploy.outputs.function_app_name }}" \
            --query 'defaultHostName' \
            -o tsv
