                --assignee-principal-type ServicePrincipal \
                --scope "$storage_account_id" \
                --role "$role_name" >/dev/null 2>&1 || \
              az role assignment create \
                --assignee-object-id "$identity_principal_id" \
                --scope "$storage_account_id" \
                --role "$role_name" >/dev/null
            fi
          done

          echo "Configured BidStorage identity settings for $app_name using $blob_service_uri"

      - name: Remove legacy bidstorage env vars from talentfunctions
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentfunctions') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
