name: Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      # ---- azd / Azure context ----
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZD_WORKING_DIR: "."
      AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}
      DOTNET_LAUNCH_PROFILE: "https-azure"
      TALENTSUITE_FORCE_AZURE_INFRA: "true"

      # ---- AppHost mode switch ----
      TALENTSUITE_INFRA_MODE: "azure"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup azd
        uses: Azure/setup-azd@v2
        with:
          version: latest

      - name: Validate Azure login inputs
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "AZURE_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "AZURE_TENANT_ID missing" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "AZURE_SUBSCRIPTION_ID missing" && exit 1)
          test -n "$AZD_INITIAL_ENVIRONMENT_CONFIG" || (echo "AZD_INITIAL_ENVIRONMENT_CONFIG missing" && exit 1)

      - name: Login to azd (GitHub OIDC)
        run: >
          azd auth login
          --client-id "${{ secrets.AZURE_CLIENT_ID }}"
          --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          --federated-credential-provider "github"
          --no-prompt

      - name: Seed azd environment from initial config
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          printf '%s' "$AZD_INITIAL_ENVIRONMENT_CONFIG" > /tmp/azd-initial.json
          jq -e . /tmp/azd-initial.json >/dev/null

          azd env new "${{ env.AZURE_ENV_NAME }}" --no-prompt || true

          jq -r 'to_entries[] | "\(.key)=\(.value|tostring)"' /tmp/azd-initial.json > /tmp/azd-initial.env
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" --file /tmp/azd-initial.env --no-prompt

          sql_password="$(jq -er '.SqlPassword // empty' /tmp/azd-initial.json)"
          keycloak_password="$(jq -er '.KeycloakPassword // empty' /tmp/azd-initial.json)"
          keycloak_db_username="$(jq -er '.KeycloakDbUsername // empty' /tmp/azd-initial.json)"
          keycloak_db_password="$(jq -er '.KeycloakDbPassword // empty' /tmp/azd-initial.json)"
          invite_smtp_username="$(jq -er '.InviteSmtpUsername // empty' /tmp/azd-initial.json)"
          invite_smtp_password="$(jq -er '.InviteSmtpPassword // empty' /tmp/azd-initial.json)"

          is_placeholder_value() {
            case "$1" in
              \<*\> | *your-smtp* ) return 0 ;;
              * ) return 1 ;;
            esac
          }

          test -n "$keycloak_db_username" || (echo "KeycloakDbUsername missing or empty in AZD_INITIAL_ENVIRONMENT_CONFIG" && exit 1)
          [ "$keycloak_db_username" != "sa" ] || (echo "KeycloakDbUsername must not be 'sa' for Azure SQL" && exit 1)
          is_placeholder_value "$keycloak_db_username" && (echo "KeycloakDbUsername appears to be a placeholder value" && exit 1)

          validate_strong_password() {
            local value="$1"
            local field="$2"
            if [ "${#value}" -lt 12 ] \
              || [[ ! "$value" =~ [A-Z] ]] \
              || [[ ! "$value" =~ [a-z] ]] \
              || [[ ! "$value" =~ [0-9] ]] \
              || [[ ! "$value" =~ [^A-Za-z0-9] ]]; then
              echo "$field must be at least 12 chars and include upper, lower, number, and special character"
              exit 1
            fi
          }

          validate_strong_password "$sql_password" "SqlPassword"
          validate_strong_password "$keycloak_db_password" "KeycloakDbPassword"

          test -n "$invite_smtp_username" || (echo "InviteSmtpUsername missing or empty in AZD_INITIAL_ENVIRONMENT_CONFIG" && exit 1)
          test -n "$invite_smtp_password" || (echo "InviteSmtpPassword missing or empty in AZD_INITIAL_ENVIRONMENT_CONFIG" && exit 1)
          is_placeholder_value "$invite_smtp_username" && (echo "InviteSmtpUsername appears to be a placeholder value" && exit 1)
          is_placeholder_value "$invite_smtp_password" && (echo "InviteSmtpPassword appears to be a placeholder value" && exit 1)

          azd env set --environment "${{ env.AZURE_ENV_NAME }}" SqlPassword "$sql_password" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" KeycloakPassword "$keycloak_password" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" KeycloakDbUsername "$keycloak_db_username" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" KeycloakDbPassword "$keycloak_db_password" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" InviteSmtpPassword "$invite_smtp_password" --no-prompt

          # Fail fast if azd did not persist required Keycloak DB values.
          vals_after_set="$(azd env get-values --environment "${{ env.AZURE_ENV_NAME }}")"
          echo "$vals_after_set" | grep -Eq '^KeycloakDbUsername=.+' || (echo "KeycloakDbUsername not persisted in azd env" && exit 1)
          echo "$vals_after_set" | grep -Eq '^KeycloakDbPassword=.+' || (echo "KeycloakDbPassword not persisted in azd env" && exit 1)

      - name: Verify required azd secure parameters exist
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          vals="$(azd env get-values --environment "${{ env.AZURE_ENV_NAME }}")"
          for k in AuthenticationEnabled UseInMemoryData SqlPassword KeycloakPassword KeycloakDbUsername KeycloakDbPassword InviteEmailEnabled InviteFromEmail InviteSmtpHost InviteSmtpPort InviteSmtpEnableSsl InviteSmtpUsername InviteSmtpPassword Password; do
            echo "$vals" | grep -Eq "^${k}=.+" && echo "$k: set" || (echo "$k: MISSING" && exit 1)
          done

      - name: Sanitize Azure environment identifiers
        run: |
          {
            echo "AZURE_SUBSCRIPTION_ID=$(echo "$AZURE_SUBSCRIPTION_ID" | tr -d '\r\n[:space:]')"
            echo "AZURE_ENV_NAME=$(echo "$AZURE_ENV_NAME" | tr -d '\r\n[:space:]')"
            echo "AZURE_LOCATION=$(echo "$AZURE_LOCATION" | tr -d '\r\n[:space:]')"
          } >> "$GITHUB_ENV"

      - name: Export Aspire parameter env vars for AppHost
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          vals="$(azd env get-values --environment "${{ env.AZURE_ENV_NAME }}")"

          keycloak_db_username="$(echo "$vals" | sed -n 's/^KeycloakDbUsername=//p' | head -n1)"
          keycloak_db_password="$(echo "$vals" | sed -n 's/^KeycloakDbPassword=//p' | head -n1)"
          keycloak_password="$(echo "$vals" | sed -n 's/^KeycloakPassword=//p' | head -n1)"
          sql_password="$(echo "$vals" | sed -n 's/^SqlPassword=//p' | head -n1)"

          test -n "$keycloak_db_username" || (echo "KeycloakDbUsername missing in azd env" && exit 1)

          {
            echo "Parameters__KeycloakDbUsername=$keycloak_db_username"
            echo "Parameters__KeycloakDbPassword=$keycloak_db_password"
            echo "Parameters__KeycloakPassword=$keycloak_password"
            echo "Parameters__SqlPassword=$sql_password"
          } >> "$GITHUB_ENV"

      - name: Provision
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: azd provision --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt --debug

      - name: Disable SQL Entra-only auth for Keycloak SQL login
        run: |
          resource_group="rg-${AZURE_ENV_NAME}"
          sql_server_name="$(az sql server list --resource-group "$resource_group" --query '[0].name' -o tsv)"

          test -n "$sql_server_name" || (echo "Could not find SQL server in resource group $resource_group" && exit 1)

          ad_only_enabled="$(az sql server ad-only-auth get \
            --resource-group "$resource_group" \
            --name "$sql_server_name" \
            --query azureAdOnlyAuthentication -o tsv)"

          if [ "$ad_only_enabled" = "true" ]; then
            az sql server ad-only-auth disable \
              --resource-group "$resource_group" \
              --name "$sql_server_name"
          fi

      - name: Deploy
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          params_keycloak_db_username="$(azd env get-value KeycloakDbUsername --environment "${{ env.AZURE_ENV_NAME }}")"
          params_keycloak_db_password="$(azd env get-value KeycloakDbPassword --environment "${{ env.AZURE_ENV_NAME }}")"
          params_keycloak_password="$(azd env get-value KeycloakPassword --environment "${{ env.AZURE_ENV_NAME }}")"
          params_sql_password="$(azd env get-value SqlPassword --environment "${{ env.AZURE_ENV_NAME }}")"

          test -n "$params_keycloak_db_username" || (echo "KeycloakDbUsername is empty before azd deploy" && exit 1)
          test -n "$params_keycloak_db_password" || (echo "KeycloakDbPassword is empty before azd deploy" && exit 1)

          Parameters__KeycloakDbUsername="$params_keycloak_db_username" \
          Parameters__KeycloakDbPassword="$params_keycloak_db_password" \
          Parameters__KeycloakPassword="$params_keycloak_password" \
          Parameters__SqlPassword="$params_sql_password" \
          azd deploy --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt

      - name: Deploy frontend as static website
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          blob_endpoint="$(azd env get-value STORAGE_BLOBENDPOINT --environment "${{ env.AZURE_ENV_NAME }}")"
          storage_account="$(echo "$blob_endpoint" | sed -E 's#^https?://([^.]+)\..*$#\1#')"

          test -n "$storage_account" || (echo "Could not resolve storage account from STORAGE_BLOBENDPOINT" && exit 1)

          storage_account_id="$(az storage account show --name "$storage_account" --query id -o tsv)"
          deployer_object_id="$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)"

          test -n "$storage_account_id" || (echo "Could not resolve storage account id" && exit 1)
          test -n "$deployer_object_id" || (echo "Could not resolve deployer service principal object id" && exit 1)

          existing_role_assignment="$(az role assignment list \
            --assignee-object-id "$deployer_object_id" \
            --scope "$storage_account_id" \
            --role "Storage Blob Data Contributor" \
            --query '[0].id' -o tsv)"

          if [ -z "$existing_role_assignment" ]; then
            az role assignment create \
              --assignee-object-id "$deployer_object_id" \
              --assignee-principal-type ServicePrincipal \
              --scope "$storage_account_id" \
              --role "Storage Blob Data Contributor"
            # RBAC assignment can take a short time to become effective for data plane operations.
            sleep 30
          fi

          dotnet publish src/TalentSuite.FrontEnd/TalentSuite.FrontEnd.csproj -c Release -o /tmp/talentsuite-frontend-publish

          azd_values="$(azd env get-values --environment "${{ env.AZURE_ENV_NAME }}")"
          find_env_value() {
            for key in "$@"; do
              value="$(echo "$azd_values" | sed -n "s/^${key}=//p" | head -n1)"
              if [ -n "$value" ]; then
                echo "$value"
                return 0
              fi
            done
            return 1
          }

          keycloak_base_url="$(find_env_value KEYCLOAK_HTTPS KEYCLOAK_HTTP KEYCLOAK_ENDPOINT SERVICE_KEYCLOAK_ENDPOINT || true)"
          talentserver_base_url="$(find_env_value TALENTSERVER_HTTPS TALENTSERVER_HTTP TALENTSERVER_ENDPOINT SERVICE_TALENTSERVER_ENDPOINT || true)"
          authentication_enabled="$(find_env_value AUTHENTICATION_ENABLED AZURE_AUTHENTICATION_ENABLED || true)"
          keycloak_client_id="$(find_env_value KEYCLOAK_CLIENT_ID || true)"

          # Fallback: resolve endpoints directly from Container Apps ingress FQDN.
          if [ -z "$keycloak_base_url" ]; then
            keycloak_fqdn="$(az containerapp show \
              --resource-group "rg-${AZURE_ENV_NAME}" \
              --name "keycloak" \
              --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)"
            [ -n "$keycloak_fqdn" ] && keycloak_base_url="https://${keycloak_fqdn}"
          fi

          if [ -z "$talentserver_base_url" ]; then
            talentserver_fqdn="$(az containerapp show \
              --resource-group "rg-${AZURE_ENV_NAME}" \
              --name "talentserver" \
              --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)"
            [ -n "$talentserver_fqdn" ] && talentserver_base_url="https://${talentserver_fqdn}"
          fi

          test -n "$keycloak_base_url" || (echo "Could not resolve Keycloak endpoint from azd environment values" && exit 1)
          test -n "$talentserver_base_url" || (echo "Could not resolve talentserver endpoint from azd environment values" && exit 1)

          keycloak_authority="$(echo "${keycloak_base_url%/}/realms/TalentConsulting")"
          authentication_enabled="${authentication_enabled:-true}"
          keycloak_client_id="${keycloak_client_id:-talentsuite-frontend}"

          jq -n \
            --arg auth "$authentication_enabled" \
            --arg authority "$keycloak_authority" \
            --arg clientId "$keycloak_client_id" \
            --arg apiBase "${talentserver_base_url%/}" \
            '{
              AUTHENTICATION_ENABLED: $auth,
              KEYCLOAK_AUTHORITY: $authority,
              KEYCLOAK_CLIENT_ID: $clientId,
              TALENTSERVER_HTTPS: $apiBase
            }' > /tmp/talentsuite-frontend-publish/wwwroot/appsettings.json

          az storage blob service-properties update \
            --account-name "$storage_account" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html

          az storage blob upload-batch \
            --account-name "$storage_account" \
            --auth-mode login \
            --destination '$web' \
            --source /tmp/talentsuite-frontend-publish/wwwroot \
            --overwrite

          echo "Frontend URL: https://${storage_account}.z33.web.core.windows.net/"
