      - name: Remove legacy bidstorage env vars from talentfunctions
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentfunctions') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          set -euo pipefail

          resource_group="rg-${AZURE_ENV_NAME}"
          app_name="talentfunctions"

          az containerapp update \
            --name "$app_name" \
            --resource-group "$resource_group" \
            --remove-env-vars ConnectionStrings__bidstorage BIDSTORAGE_URI >/dev/null || true

          echo "Removed legacy bidstorage env vars from $app_name"

      - name: Configure Azure AI settings for talentserver
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentserver') }}
        run: |
          set -euo pipefail

          resource_group="rg-${AZURE_ENV_NAME}"
          app_name="talentserver"

          secret_args=()
          env_args=()

          if [ -n "${DocumentIntelligenceApiKey:-}" ]; then
            secret_args+=("documentintelligence--apikey=${DocumentIntelligenceApiKey}")
            env_args+=("DocumentIntelligence__ApiKey=secretref:documentintelligence--apikey")
          fi

          if [ -n "${AzureOpenAIApiKey:-}" ]; then
            secret_args+=("azureopenai--apikey=${AzureOpenAIApiKey}")
            env_args+=("AzureOpenAI__ApiKey=secretref:azureopenai--apikey")
          fi

          if [ "${#secret_args[@]}" -gt 0 ]; then
            az containerapp secret set \
              --name "$app_name" \
              --resource-group "$resource_group" \
              --secrets "${secret_args[@]}" >/dev/null
          fi

          if [ -n "${DocumentIntelligenceEndpoint:-}" ]; then
            env_args+=("DocumentIntelligence__Endpoint=${DocumentIntelligenceEndpoint}")
          fi

          if [ -n "${AzureOpenAIEndpoint:-}" ]; then
            env_args+=("AzureOpenAI__Endpoint=${AzureOpenAIEndpoint}")
          fi

          if [ -n "${AzureOpenAIChatDeployment:-}" ]; then
            env_args+=("AzureOpenAI__ChatDeployment=${AzureOpenAIChatDeployment}")
          fi

          if [ -n "${AzureAIFoundryProjectEndpoint:-}" ]; then
            env_args+=("AzureAIFoundry__ProjectEndpoint=${AzureAIFoundryProjectEndpoint}")
          fi

          if [ -n "${AgentsAgentId:-}" ]; then
            env_args+=("Agents__AgentId=${AgentsAgentId}")
          fi

          if [ -n "${FrontendPublicOrigin:-}" ]; then
            env_args+=("FRONTEND_PUBLIC_ORIGIN=${FrontendPublicOrigin}")
          fi

          if [ -n "${KeycloakPublicOrigin:-}" ]; then
            env_args+=("KEYCLOAK_AUTHORITY=${KeycloakPublicOrigin%/}/realms/TalentConsulting")
            env_args+=("KEYCLOAK_BASE_URL=${KeycloakPublicOrigin%/}")
          fi

          if [ "${#env_args[@]}" -gt 0 ]; then
            az containerapp update \
              --name "$app_name" \
              --resource-group "$resource_group" \
              --set-env-vars "${env_args[@]}" >/dev/null
          else
            echo "No Azure AI settings configured for $app_name"
          fi

      - name: Enable talentserver ingress
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentserver') }}
        run: |
          az containerapp ingress enable \
            --name talentserver \
            --resource-group "rg-${AZURE_ENV_NAME}" \
            --type external \
            --target-port 8080 \
            --transport auto

      - name: Show talentserver URL
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentserver') }}
        run: |
          az containerapp show \
            --name talentserver \
            --resource-group "rg-${AZURE_ENV_NAME}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv

      - name: Import Keycloak realm if missing
        if: ${{ success() && github.event.inputs.deployment_mode != 'apps-only' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'keycloak') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/import-keycloak-realm.sh
          scripts/ci/import-keycloak-realm.sh

      - name: Refresh Azure Login (OIDC) before frontend deploy
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend') }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh azd environment outputs before frontend deploy
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          set -euo pipefail
          azd auth login --client-id "${{ secrets.AZURE_CLIENT_ID }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}" --federated-credential-provider "github" --no-prompt
          azd auth login --check-status >/dev/null
          azd env refresh --environment "${AZURE_ENV_NAME}" --no-prompt
          echo "Refreshed azd environment outputs before frontend deploy."

      - name: Deploy frontend as static website
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        env:
          DEPLOYER_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          chmod +x scripts/ci/deploy-frontend-static.sh
          scripts/ci/deploy-frontend-static.sh

      - name: Tag resource group and Azure resources
        if: ${{ success() && github.event.inputs.deployment_mode != 'apps-only' }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/tag-azure-resources.sh
          scripts/ci/tag-azure-resources.sh
