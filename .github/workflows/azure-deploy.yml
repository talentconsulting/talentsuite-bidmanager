name: Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      # ---- azd / Azure context ----
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZD_WORKING_DIR: "."
      AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}
      DOTNET_LAUNCH_PROFILE: "https-azure"
      TALENTSUITE_FORCE_AZURE_INFRA: "true"

      # ---- AppHost mode switch ----
      TALENTSUITE_INFRA_MODE: "azure"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup azd
        uses: Azure/setup-azd@v2
        with:
          version: 1.23.6

      - name: Validate Azure login inputs
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "AZURE_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "AZURE_TENANT_ID missing" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "AZURE_SUBSCRIPTION_ID missing" && exit 1)
          test -n "$AZD_INITIAL_ENVIRONMENT_CONFIG" || (echo "AZD_INITIAL_ENVIRONMENT_CONFIG missing" && exit 1)

      - name: Login to azd (GitHub OIDC)
        run: >
          azd auth login
          --client-id "${{ secrets.AZURE_CLIENT_ID }}"
          --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          --federated-credential-provider "github"
          --no-prompt

      - name: Seed azd environment from initial config
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/seed-azd-env.sh
          scripts/ci/seed-azd-env.sh

      - name: Seed azd principalId from OIDC token
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          arm_token="$(az account get-access-token --resource-type arm --query accessToken -o tsv)"
          payload="$(printf '%s' "$arm_token" | cut -d'.' -f2 | tr '_-' '/+')"
          padding=$(( (4 - ${#payload} % 4) % 4 ))
          payload="${payload}$(printf '=%.0s' $(seq 1 "$padding"))"
          principal_id="$(printf '%s' "$payload" | base64 -d | jq -r '.oid // empty')"

          test -n "$principal_id" || (echo "Could not resolve principalId from OIDC token" && exit 1)
          azd env set principalId "$principal_id" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__principalId "$principal_id" --environment "${{ env.AZURE_ENV_NAME }}"
          echo "AZD_PRINCIPAL_ID=$principal_id" >> "$GITHUB_ENV"
          echo "Seeded azd env principalId"

      - name: Provision
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          params_keycloak_db_username="$(azd env get-value KeycloakDbUsername --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_keycloak_db_password="$(azd env get-value KeycloakDbPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_keycloak_password="$(azd env get-value KeycloakPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_sql_password="$(azd env get-value SqlPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_invite_smtp_password="$(azd env get-value InviteSmtpPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"

          if [ -z "$params_keycloak_db_username" ]; then
            params_keycloak_db_username="$(azd env get-value Parameters__KeycloakDbUsername --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi
          if [ -z "$params_keycloak_db_password" ]; then
            params_keycloak_db_password="$(azd env get-value Parameters__KeycloakDbPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi
          if [ -z "$params_keycloak_password" ]; then
            params_keycloak_password="$(azd env get-value Parameters__KeycloakPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi
          if [ -z "$params_sql_password" ]; then
            params_sql_password="$(azd env get-value Parameters__SqlPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi
          if [ -z "$params_invite_smtp_password" ]; then
            params_invite_smtp_password="$(azd env get-value Parameters__InviteSmtpPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi

          params_keycloak_db_username="$(printf '%s' "$params_keycloak_db_username" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          params_keycloak_db_password="$(printf '%s' "$params_keycloak_db_password" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          params_keycloak_password="$(printf '%s' "$params_keycloak_password" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          params_sql_password="$(printf '%s' "$params_sql_password" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          params_invite_smtp_password="$(printf '%s' "$params_invite_smtp_password" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"

          echo "::add-mask::$params_keycloak_db_password"
          echo "::add-mask::$params_keycloak_password"
          echo "::add-mask::$params_sql_password"
          echo "::add-mask::$params_invite_smtp_password"

          test -n "$params_keycloak_db_username" || (echo "KeycloakDbUsername is empty/missing before azd provision" && exit 1)
          test -n "$params_keycloak_db_password" || (echo "KeycloakDbPassword is empty/missing before azd provision" && exit 1)
          test -n "$params_keycloak_password" || (echo "KeycloakPassword is empty/missing before azd provision" && exit 1)
          test -n "$params_sql_password" || (echo "SqlPassword is empty/missing before azd provision" && exit 1)
          test -n "$params_invite_smtp_password" || (echo "InviteSmtpPassword is empty/missing before azd provision" && exit 1)
          test -n "${AZD_PRINCIPAL_ID:-}" || (echo "AZD_PRINCIPAL_ID is empty/missing before azd provision" && exit 1)

          Parameters__KeycloakDbUsername="$params_keycloak_db_username" \
          Parameters__KeycloakDbPassword="$params_keycloak_db_password" \
          Parameters__KeycloakPassword="$params_keycloak_password" \
          Parameters__SqlPassword="$params_sql_password" \
          Parameters__InviteSmtpPassword="$params_invite_smtp_password" \
          Parameters__principalId="${AZD_PRINCIPAL_ID}" \
          azd provision --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt --debug

      - name: Disable SQL Entra-only auth for Keycloak SQL login
        run: |
          resource_group="rg-${AZURE_ENV_NAME}"
          sql_server_name="$(az sql server list --resource-group "$resource_group" --query '[0].name' -o tsv)"

          test -n "$sql_server_name" || (echo "Could not find SQL server in resource group $resource_group" && exit 1)

          ad_only_enabled="$(az sql server ad-only-auth get \
            --resource-group "$resource_group" \
            --name "$sql_server_name" \
            --query azureAdOnlyAuthentication -o tsv)"

          if [ "$ad_only_enabled" = "true" ]; then
            az sql server ad-only-auth disable \
              --resource-group "$resource_group" \
              --name "$sql_server_name"
          fi

      - name: Deploy
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          params_keycloak_db_username="$(azd env get-value KeycloakDbUsername --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_keycloak_db_password="$(azd env get-value KeycloakDbPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_keycloak_password="$(azd env get-value KeycloakPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          params_sql_password="$(azd env get-value SqlPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"

          if [ -z "$params_keycloak_db_username" ]; then
            params_keycloak_db_username="$(azd env get-value Parameters__KeycloakDbUsername --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi
          if [ -z "$params_keycloak_db_password" ]; then
            params_keycloak_db_password="$(azd env get-value Parameters__KeycloakDbPassword --environment "${{ env.AZURE_ENV_NAME }}" 2>/dev/null || true)"
          fi

          echo "::add-mask::$params_keycloak_db_password"
          echo "::add-mask::$params_keycloak_password"
          echo "::add-mask::$params_sql_password"

          params_keycloak_db_username="$(printf '%s' "$params_keycloak_db_username" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          params_keycloak_db_password="$(printf '%s' "$params_keycloak_db_password" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"

          test -n "$params_keycloak_db_username" || (echo "KeycloakDbUsername is empty/missing before azd deploy" && exit 1)
          test -n "$params_keycloak_db_password" || (echo "KeycloakDbPassword is empty/missing before azd deploy" && exit 1)

          Parameters__KeycloakDbUsername="$params_keycloak_db_username" \
          Parameters__KeycloakDbPassword="$params_keycloak_db_password" \
          Parameters__KeycloakPassword="$params_keycloak_password" \
          Parameters__SqlPassword="$params_sql_password" \
          azd deploy --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt

      - name: Deploy frontend as static website
        working-directory: ${{ env.AZD_WORKING_DIR }}
        env:
          DEPLOYER_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          chmod +x scripts/ci/deploy-frontend-static.sh
          scripts/ci/deploy-frontend-static.sh
