name: Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      # ---- azd / Azure context ----
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZD_WORKING_DIR: "."
      AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

      # ---- AppHost mode switch ----
      TALENTSUITE_INFRA_MODE: "azure"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup azd
        uses: Azure/setup-azd@v2
        with:
          version: latest

      - name: Validate Azure login inputs
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "AZURE_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "AZURE_TENANT_ID missing" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "AZURE_SUBSCRIPTION_ID missing" && exit 1)
          test -n "$AZD_INITIAL_ENVIRONMENT_CONFIG" || (echo "AZD_INITIAL_ENVIRONMENT_CONFIG missing" && exit 1)

      - name: Login to azd (GitHub OIDC)
        run: >
          azd auth login
          --client-id "${{ secrets.AZURE_CLIENT_ID }}"
          --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          --federated-credential-provider "github"
          --no-prompt

      - name: Seed azd environment from initial config
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          printf '%s' "$AZD_INITIAL_ENVIRONMENT_CONFIG" > /tmp/azd-initial.json
          jq -e . /tmp/azd-initial.json >/dev/null

          azd env new "${{ env.AZURE_ENV_NAME }}" --no-prompt || true

          jq -r 'to_entries[] | "\(.key)=\(.value|tostring)"' /tmp/azd-initial.json > /tmp/azd-initial.env
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" --file /tmp/azd-initial.env --no-prompt

          sql_password="$(jq -r '.SqlPassword' /tmp/azd-initial.json)"
          keycloak_password="$(jq -r '.KeycloakPassword' /tmp/azd-initial.json)"
          keycloak_db_password="$(jq -r '.KeycloakDbPassword' /tmp/azd-initial.json)"
          invite_smtp_password="$(jq -r '.InviteSmtpPassword' /tmp/azd-initial.json)"

          azd env set --environment "${{ env.AZURE_ENV_NAME }}" SqlPassword "$sql_password" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" KeycloakPassword "$keycloak_password" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" KeycloakDbPassword "$keycloak_db_password" --no-prompt
          azd env set --environment "${{ env.AZURE_ENV_NAME }}" InviteSmtpPassword "$invite_smtp_password" --no-prompt

      - name: Verify required azd secure parameters exist
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          vals="$(azd env get-values --environment "${{ env.AZURE_ENV_NAME }}")"
          for k in AuthenticationEnabled UseInMemoryData SqlPassword KeycloakPassword KeycloakDbUsername KeycloakDbPassword InviteEmailEnabled InviteFromEmail InviteSmtpHost InviteSmtpPort InviteSmtpEnableSsl InviteSmtpUsername InviteSmtpPassword Password; do
            echo "$vals" | grep -Eq "^${k}=.+" && echo "$k: set" || (echo "$k: MISSING" && exit 1)
          done

      - name: Sanitize Azure environment identifiers
        run: |
          {
            echo "AZURE_SUBSCRIPTION_ID=$(echo "$AZURE_SUBSCRIPTION_ID" | tr -d '\r\n[:space:]')"
            echo "AZURE_ENV_NAME=$(echo "$AZURE_ENV_NAME" | tr -d '\r\n[:space:]')"
            echo "AZURE_LOCATION=$(echo "$AZURE_LOCATION" | tr -d '\r\n[:space:]')"
          } >> "$GITHUB_ENV"

      - name: Provision
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: azd provision --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt --debug

      - name: Deploy
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: azd deploy --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt

      - name: Deploy frontend as static website
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          blob_endpoint="$(azd env get-value STORAGE_BLOBENDPOINT --environment "${{ env.AZURE_ENV_NAME }}")"
          storage_account="$(echo "$blob_endpoint" | sed -E 's#^https?://([^.]+)\..*$#\1#')"

          test -n "$storage_account" || (echo "Could not resolve storage account from STORAGE_BLOBENDPOINT" && exit 1)

          dotnet publish src/TalentSuite.FrontEnd/TalentSuite.FrontEnd.csproj -c Release -o /tmp/talentsuite-frontend-publish

          az storage blob service-properties update \
            --account-name "$storage_account" \
            --static-website \
            --index-document index.html \
            --404-document index.html

          storage_key="$(az storage account keys list --account-name "$storage_account" --query '[0].value' -o tsv)"

          az storage blob upload-batch \
            --account-name "$storage_account" \
            --account-key "$storage_key" \
            --destination '$web' \
            --source /tmp/talentsuite-frontend-publish/wwwroot \
            --overwrite

          echo "Frontend URL: https://${storage_account}.z33.web.core.windows.net/"
