name: Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      # ---- azd / Azure context ----
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZD_WORKING_DIR: "."

      # ---- AppHost mode switch ----
      TALENTSUITE_INFRA_MODE: "azure"

      # ---- AppHost Parameters__ placeholders ----
      Parameters__AuthenticationEnabled: "true"
      Parameters__UseInMemoryData: "false"
      Parameters__SqlPassword: ${{ secrets.SQL_PASSWORD }}
      Parameters__KeycloakPassword: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
      Parameters__KeycloakDbUsername: ${{ secrets.KEYCLOAK_DB_USERNAME }}
      Parameters__KeycloakDbPassword: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
      Parameters__InviteEmailEnabled: "false"
      Parameters__InviteFromEmail: ${{ secrets.INVITE_FROM_EMAIL }}
      Parameters__InviteSmtpHost: ${{ secrets.INVITE_SMTP_HOST }}
      Parameters__InviteSmtpPort: "587"
      Parameters__InviteSmtpEnableSsl: "true"
      Parameters__InviteSmtpUsername: ${{ secrets.INVITE_SMTP_USERNAME }}
      Parameters__InviteSmtpPassword: ${{ secrets.INVITE_SMTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup azd
        uses: Azure/setup-azd@v2

      - name: Validate Azure login inputs
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "AZURE_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "AZURE_TENANT_ID missing" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "AZURE_SUBSCRIPTION_ID missing" && exit 1)

      - name: Verify Azure CLI session
        run: az account show --output none

      - name: Login to azd (GitHub OIDC)
        run: >
          azd auth login
          --client-id "${{ secrets.AZURE_CLIENT_ID }}"
          --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          --federated-credential-provider "github"
          --no-prompt

      - name: Seed azd environment parameters
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          azd env set AuthenticationEnabled "${{ env.Parameters__AuthenticationEnabled }}"
          azd env set UseInMemoryData "${{ env.Parameters__UseInMemoryData }}"
          azd env set SqlPassword "${{ env.Parameters__SqlPassword }}"
          azd env set KeycloakPassword "${{ env.Parameters__KeycloakPassword }}"
          azd env set KeycloakDbUsername "${{ env.Parameters__KeycloakDbUsername }}"
          azd env set KeycloakDbPassword "${{ env.Parameters__KeycloakDbPassword }}"
          azd env set InviteEmailEnabled "${{ env.Parameters__InviteEmailEnabled }}"
          azd env set InviteFromEmail "${{ env.Parameters__InviteFromEmail }}"
          azd env set InviteSmtpHost "${{ env.Parameters__InviteSmtpHost }}"
          azd env set InviteSmtpPort "${{ env.Parameters__InviteSmtpPort }}"
          azd env set InviteSmtpEnableSsl "${{ env.Parameters__InviteSmtpEnableSsl }}"
          azd env set InviteSmtpUsername "${{ env.Parameters__InviteSmtpUsername }}"
          azd env set InviteSmtpPassword "${{ env.Parameters__InviteSmtpPassword }}"

      - name: Provision
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: azd provision --no-prompt

      - name: Deploy
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: azd deploy --no-prompt
