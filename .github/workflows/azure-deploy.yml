            --resource-group "$resource_group" \
            --query identity.principalId -o tsv)"
          test -n "$identity_principal_id" || (echo "Could not resolve managed identity principalId for $app_name" && exit 1)
          echo "talentserver principalId: $identity_principal_id"

          foundry_account_name="$(printf '%s' "$project_endpoint" | sed -E 's#https://([^./]+)\.services\.ai\.azure\.com/.*#\1#')"
          foundry_project_name="$(printf '%s' "$project_endpoint" | sed -E 's#.*/api/projects/([^/?]+).*#\1#')"

          test -n "$foundry_account_name" || (echo "Could not parse Foundry account name from AzureAIFoundryProjectEndpoint" && exit 1)
          test -n "$foundry_project_name" || (echo "Could not parse Foundry project name from AzureAIFoundryProjectEndpoint" && exit 1)

          foundry_account_id="$(az cognitiveservices account show \
            --name "$foundry_account_name" \
            --resource-group "$resource_group" \
            --query id -o tsv)"
          test -n "$foundry_account_id" || (echo "Could not resolve Foundry account resource id" && exit 1)

          foundry_project_id="${foundry_account_id}/projects/${foundry_project_name}"

          echo "Waiting for managed identity service principal to propagate"
          sleep 30

          ensure_role_assignment() {
            local scope="$1"
            local attempt
            for attempt in 1 2 3 4 5 6; do
              echo "Ensuring Azure AI User on scope: $scope (attempt $attempt/6)"
              az role assignment create \
                --assignee-object-id "$identity_principal_id" \
                --assignee-principal-type ServicePrincipal \
                --role "Azure AI User" \
                --scope "$scope" \
                --only-show-errors >/dev/null 2>&1 || true

              if az role assignment list \
                --assignee-object-id "$identity_principal_id" \
                --scope "$scope" \
                --query "[?roleDefinitionName=='Azure AI User'] | length(@)" \
                -o tsv | grep -qx '1'; then
                echo "Verified Azure AI User on $scope"
                return 0
              fi

              if [ "$attempt" -lt 6 ]; then
                echo "Role assignment not visible yet on $scope. Waiting 15s."
                sleep 15
              fi
            done

            echo "Failed to verify Azure AI User role assignment on $scope for principal $identity_principal_id"
            az role assignment list \
              --assignee-object-id "$identity_principal_id" \
              --scope "$scope" \
              -o table || true
            return 1
          }

          ensure_role_assignment "$foundry_account_id"

          if ! ensure_role_assignment "$foundry_project_id"; then
            echo "Project-scope Azure AI User assignment could not be verified. Continuing because account-scope assignment succeeded."
          fi

      - name: Enable talentserver ingress
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentserver') }}
        run: |
          az containerapp ingress enable \
            --name talentserver \
            --resource-group "rg-${AZURE_ENV_NAME}" \
            --type external \
            --target-port 8080 \
            --transport auto

      - name: Configure talentserver health probes
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'talentserver') }}
        run: |
          set -euo pipefail

          resource_group="rg-${AZURE_ENV_NAME}"
          app_id="$(az containerapp show --name talentserver --resource-group "$resource_group" --query id -o tsv)"
          probes='[
            {"type":"Startup","httpGet":{"path":"/health","port":8080},"initialDelaySeconds":5,"periodSeconds":10,"timeoutSeconds":5,"failureThreshold":24},
            {"type":"Readiness","httpGet":{"path":"/health","port":8080},"initialDelaySeconds":5,"periodSeconds":10,"timeoutSeconds":5,"failureThreshold":3},
            {"type":"Liveness","httpGet":{"path":"/health","port":8080},"initialDelaySeconds":30,"periodSeconds":30,"timeoutSeconds":5,"failureThreshold":3}
          ]'

          az resource update \
            --ids "$app_id" \
            --set properties.template.containers[0].probes="$probes" >/dev/null

      - name: Configure keycloak health probes
        if: ${{ success() && github.event.inputs.deployment_mode != 'apps-only' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'keycloak') }}
        run: |
          set -euo pipefail

          resource_group="rg-${AZURE_ENV_NAME}"
          app_id="$(az containerapp show --name keycloak --resource-group "$resource_group" --query id -o tsv)"
          probes='[
            {"type":"Startup","httpGet":{"path":"/realms/master/.well-known/openid-configuration","port":8080},"initialDelaySeconds":10,"periodSeconds":10,"timeoutSeconds":5,"failureThreshold":30},
            {"type":"Readiness","httpGet":{"path":"/realms/master/.well-known/openid-configuration","port":8080},"initialDelaySeconds":10,"periodSeconds":10,"timeoutSeconds":5,"failureThreshold":6},
            {"type":"Liveness","httpGet":{"path":"/realms/master/.well-known/openid-configuration","port":8080},"initialDelaySeconds":30,"periodSeconds":30,"timeoutSeconds":5,"failureThreshold":3}
          ]'

          az resource update \
            --ids "$app_id" \
            --set properties.template.containers[0].probes="$probes" >/dev/null

      - name: Disable SQL public network access
        if: ${{ success() && github.event.inputs.deployment_mode != 'apps-only' }}
        run: |
          set -euo pipefail

          resource_group="rg-${AZURE_ENV_NAME}"
          sql_server_name="$(az sql server list --resource-group "$resource_group" --query '[0].name' -o tsv)"

          test -n "$sql_server_name" || (echo "Could not resolve SQL server name in $resource_group" && exit 1)

          az sql server update \
            --resource-group "$resource_group" \
            --name "$sql_server_name" \
            --set publicNetworkAccess=Disabled >/dev/null

      - name: Import Keycloak realm if missing
        if: ${{ success() && github.event.inputs.deployment_mode != 'apps-only' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'keycloak') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/import-keycloak-realm.sh
          scripts/ci/import-keycloak-realm.sh

      - name: Refresh Azure Login (OIDC) before frontend deploy
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend') }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh azd environment outputs before frontend deploy
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          set -euo pipefail
          azd auth login --client-id "${{ secrets.AZURE_CLIENT_ID }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}" --federated-credential-provider "github" --no-prompt
          azd auth login --check-status >/dev/null
          azd env refresh --environment "${AZURE_ENV_NAME}" --no-prompt

      - name: Deploy frontend as static website
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        env:
          DEPLOYER_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          chmod +x scripts/ci/deploy-frontend-static.sh
          scripts/ci/deploy-frontend-static.sh

      - name: Tag resource group and Azure resources
        if: ${{ success() && github.event.inputs.deployment_mode != 'apps-only' }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/tag-azure-resources.sh
          scripts/ci/tag-azure-resources.sh
