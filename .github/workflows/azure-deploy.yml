name: Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      # ---- azd / Azure context ----
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZD_WORKING_DIR: "."
      AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}
      DOTNET_LAUNCH_PROFILE: "https-azure"
      TALENTSUITE_FORCE_AZURE_INFRA: "true"

      # ---- AppHost mode switch ----
      TALENTSUITE_INFRA_MODE: "azure"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup azd
        uses: Azure/setup-azd@v2
        with:
          version: 1.23.6

      - name: Validate Azure login inputs
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "AZURE_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "AZURE_TENANT_ID missing" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "AZURE_SUBSCRIPTION_ID missing" && exit 1)
          test -n "$AZD_INITIAL_ENVIRONMENT_CONFIG" || (echo "AZD_INITIAL_ENVIRONMENT_CONFIG missing" && exit 1)

      - name: Seed azd environment from initial config
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/seed-azd-env.sh
          scripts/ci/seed-azd-env.sh

      - name: Seed azd principalId from OIDC token
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          arm_token="$(az account get-access-token --resource-type arm --query accessToken -o tsv)"
          payload="$(printf '%s' "$arm_token" | cut -d'.' -f2 | tr '_-' '/+')"
          padding=$(( (4 - ${#payload} % 4) % 4 ))
          payload="${payload}$(printf '=%.0s' $(seq 1 "$padding"))"
          principal_id="$(printf '%s' "$payload" | base64 --decode --ignore-garbage 2>/dev/null | jq -r '.oid // empty')"

          if [ -z "$principal_id" ]; then
            principal_id="$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv 2>/dev/null || true)"
          fi

          test -n "$principal_id" || (echo "Could not resolve principalId from OIDC token" && exit 1)
          azd env set principalId "$principal_id" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__principalId "$principal_id" --environment "${{ env.AZURE_ENV_NAME }}"
          echo "AZD_PRINCIPAL_ID=$principal_id" >> "$GITHUB_ENV"
          echo "Seeded azd env principalId"

      - name: Export azd environment values for later steps
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/load-azd-env.sh
          scripts/ci/load-azd-env.sh

      - name: Provision
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          set -euo pipefail
          test -n "${Parameters__KeycloakDbUsername:-${KeycloakDbUsername:-}}" || (echo "KeycloakDbUsername/Parameters__KeycloakDbUsername is empty/missing before azd provision" && exit 1)
          test -n "${Parameters__KeycloakDbPassword:-${KeycloakDbPassword:-}}" || (echo "KeycloakDbPassword/Parameters__KeycloakDbPassword is empty/missing before azd provision" && exit 1)
          test -n "${Parameters__KeycloakPassword:-${KeycloakPassword:-}}" || (echo "KeycloakPassword/Parameters__KeycloakPassword is empty/missing before azd provision" && exit 1)
          test -n "${Parameters__SqlPassword:-${SqlPassword:-}}" || (echo "SqlPassword/Parameters__SqlPassword is empty/missing before azd provision" && exit 1)
          test -n "${Parameters__InviteSmtpPassword:-${InviteSmtpPassword:-}}" || (echo "InviteSmtpPassword/Parameters__InviteSmtpPassword is empty/missing before azd provision" && exit 1)
          test -n "${AZD_PRINCIPAL_ID:-}" || (echo "AZD_PRINCIPAL_ID is empty/missing before azd provision" && exit 1)

          azd auth login --client-id "${{ secrets.AZURE_CLIENT_ID }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}" --federated-credential-provider "github" --no-prompt
          azd auth login --check-status >/dev/null

          azd env set principalId "${AZD_PRINCIPAL_ID}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__principalId "${AZD_PRINCIPAL_ID}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set SqlPassword "${SqlPassword:-${Parameters__SqlPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__SqlPassword "${SqlPassword:-${Parameters__SqlPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set KeycloakPassword "${KeycloakPassword:-${Parameters__KeycloakPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__KeycloakPassword "${KeycloakPassword:-${Parameters__KeycloakPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set KeycloakDbPassword "${KeycloakDbPassword:-${Parameters__KeycloakDbPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__KeycloakDbPassword "${KeycloakDbPassword:-${Parameters__KeycloakDbPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set InviteSmtpPassword "${InviteSmtpPassword:-${Parameters__InviteSmtpPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__InviteSmtpPassword "${InviteSmtpPassword:-${Parameters__InviteSmtpPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"

          principalId="${AZD_PRINCIPAL_ID}" \
          SqlPassword="${SqlPassword:-${Parameters__SqlPassword:-}}" \
          KeycloakPassword="${KeycloakPassword:-${Parameters__KeycloakPassword:-}}" \
          KeycloakDbPassword="${KeycloakDbPassword:-${Parameters__KeycloakDbPassword:-}}" \
          InviteSmtpPassword="${InviteSmtpPassword:-${Parameters__InviteSmtpPassword:-}}" \
          azd provision --environment "${{ env.AZURE_ENV_NAME }}"

      - name: Disable SQL Entra-only auth for Keycloak SQL login
        run: |
          resource_group="rg-${AZURE_ENV_NAME}"
          sql_server_name="$(az sql server list --resource-group "$resource_group" --query '[0].name' -o tsv)"

          test -n "$sql_server_name" || (echo "Could not find SQL server in resource group $resource_group" && exit 1)

          ad_only_enabled="$(az sql server ad-only-auth get \
            --resource-group "$resource_group" \
            --name "$sql_server_name" \
            --query azureAdOnlyAuthentication -o tsv)"

          if [ "$ad_only_enabled" = "true" ]; then
            az sql server ad-only-auth disable \
              --resource-group "$resource_group" \
              --name "$sql_server_name"
          fi

      - name: Pre-sync Container App secrets from GitHub secrets to Key Vault refs
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/sync-containerapp-secrets-keyvault.sh
          scripts/ci/sync-containerapp-secrets-keyvault.sh

      - name: Deploy
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          set -euo pipefail
          test -n "${Parameters__KeycloakDbUsername:-${KeycloakDbUsername:-}}" || (echo "KeycloakDbUsername/Parameters__KeycloakDbUsername is empty/missing before azd deploy" && exit 1)
          test -n "${Parameters__KeycloakDbPassword:-${KeycloakDbPassword:-}}" || (echo "KeycloakDbPassword/Parameters__KeycloakDbPassword is empty/missing before azd deploy" && exit 1)
          test -n "${Parameters__KeycloakPassword:-${KeycloakPassword:-}}" || (echo "KeycloakPassword/Parameters__KeycloakPassword is empty/missing before azd deploy" && exit 1)
          azd auth login --client-id "${{ secrets.AZURE_CLIENT_ID }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}" --federated-credential-provider "github" --no-prompt
          azd auth login --check-status >/dev/null

          # Re-seed secure parameters right before deploy to avoid empty Container App secrets.
          azd env set KeycloakPassword "${KeycloakPassword:-${Parameters__KeycloakPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__KeycloakPassword "${KeycloakPassword:-${Parameters__KeycloakPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set KeycloakDbPassword "${KeycloakDbPassword:-${Parameters__KeycloakDbPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__KeycloakDbPassword "${KeycloakDbPassword:-${Parameters__KeycloakDbPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set InviteSmtpPassword "${InviteSmtpPassword:-${Parameters__InviteSmtpPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"
          azd env set Parameters__InviteSmtpPassword "${InviteSmtpPassword:-${Parameters__InviteSmtpPassword:-}}" --environment "${{ env.AZURE_ENV_NAME }}"

          vals="$(azd env get-values --environment "${{ env.AZURE_ENV_NAME }}")"
          echo "$vals" | grep -Eq '^KeycloakPassword=.+' || (echo "KeycloakPassword missing/blank in azd env before deploy" && exit 1)
          echo "$vals" | grep -Eq '^KeycloakDbPassword=.+' || (echo "KeycloakDbPassword missing/blank in azd env before deploy" && exit 1)
          echo "$vals" | grep -Eq '^InviteSmtpPassword=.+' || (echo "InviteSmtpPassword missing/blank in azd env before deploy" && exit 1)

          # Use placeholders in AppHost for azd manifest generation; real values are
          # rebound to Key Vault references in the post-sync step.
          principalId="${AZD_PRINCIPAL_ID}" \
          SqlPassword="${SqlPassword:-${Parameters__SqlPassword:-}}" \
          KeycloakPassword="${KeycloakPassword:-${Parameters__KeycloakPassword:-}}" \
          KeycloakDbPassword="${KeycloakDbPassword:-${Parameters__KeycloakDbPassword:-}}" \
          InviteSmtpPassword="${InviteSmtpPassword:-${Parameters__InviteSmtpPassword:-}}" \
          azd deploy --environment "${{ env.AZURE_ENV_NAME }}" --no-prompt

      - name: Post-sync Container App secrets from GitHub secrets to Key Vault refs
        if: always()
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          chmod +x scripts/ci/sync-containerapp-secrets-keyvault.sh
          scripts/ci/sync-containerapp-secrets-keyvault.sh

      - name: Deploy frontend as static website
        working-directory: ${{ env.AZD_WORKING_DIR }}
        env:
          DEPLOYER_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          chmod +x scripts/ci/deploy-frontend-static.sh
          scripts/ci/deploy-frontend-static.sh
