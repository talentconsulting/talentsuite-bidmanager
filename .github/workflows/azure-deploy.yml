      - name: Configure Grafana settings
        if: ${{ success() && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'grafana') }}
        working-directory: ${{ env.AZD_WORKING_DIR }}
        run: |
          set -euo pipefail

          resource_group="rg-${AZURE_ENV_NAME}"
          app_name="grafana"

          test -n "${GrafanaEntraEnabled:-}" || (echo "GrafanaEntraEnabled is empty/missing" && exit 1)
          test -n "${GrafanaPublicOrigin:-}" || (echo "GrafanaPublicOrigin is empty/missing" && exit 1)
          test -n "${GrafanaEntraClientSecret:-}" || (echo "GrafanaEntraClientSecret is empty/missing" && exit 1)

          az containerapp secret set \
            --name "$app_name" \
            --resource-group "$resource_group" \
            --secrets "gf-auth-azuread-client-secret=${GrafanaEntraClientSecret}" >/dev/null

          env_args=(
            "GF_AUTH_AZUREAD_ENABLED=${GrafanaEntraEnabled}"
            "GF_SERVER_ROOT_URL=${GrafanaPublicOrigin}"
            "GF_AUTH_AZUREAD_CLIENT_SECRET=secretref:gf-auth-azuread-client-secret"
            "GF_AUTH_AZUREAD_ALLOW_ASSIGN_GRAFANA_ADMIN=true"
            "GF_SECURITY_COOKIE_SECURE=true"
            "GF_SECURITY_COOKIE_SAMESITE=lax"
            "GF_SECURITY_CSRF_ADDITIONAL_HEADERS=X-Forwarded-Host"
          )

          grafana_public_host="${GrafanaPublicOrigin#http://}"
          grafana_public_host="${grafana_public_host#https://}"
          grafana_public_host="${grafana_public_host%%/*}"

          if [ -n "$grafana_public_host" ]; then
            env_args+=("GF_SERVER_DOMAIN=${grafana_public_host}")
            env_args+=("GF_SECURITY_CSRF_TRUSTED_ORIGINS=${GrafanaPublicOrigin}")
          fi

          if [ -n "${GrafanaEntraClientId:-}" ]; then
            env_args+=("GF_AUTH_AZUREAD_CLIENT_ID=${GrafanaEntraClientId}")
          fi

          if [ -n "${GrafanaEntraTenantId:-}" ]; then
            env_args+=("GF_AUTH_AZUREAD_ALLOWED_ORGANIZATIONS=${GrafanaEntraTenantId}")
            env_args+=("GF_AUTH_AZUREAD_AUTH_URL=https://login.microsoftonline.com/${GrafanaEntraTenantId}/oauth2/v2.0/authorize")
            env_args+=("GF_AUTH_AZUREAD_TOKEN_URL=https://login.microsoftonline.com/${GrafanaEntraTenantId}/oauth2/v2.0/token")
          fi

          if [ -n "${GrafanaAzureMonitorSubscriptionId:-}" ]; then
            env_args+=("GRAFANA_AZURE_MONITOR_SUBSCRIPTION_ID=${GrafanaAzureMonitorSubscriptionId}")
          fi

          az containerapp update \
            --name "$app_name" \
            --resource-group "$resource_group" \
            --set-env-vars "${env_args[@]}" >/dev/null

          echo "Configured Grafana settings for $app_name"

