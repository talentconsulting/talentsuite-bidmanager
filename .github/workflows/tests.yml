name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TalentSuite.sln

      - name: Run unit tests
        run: dotnet test src/TalentSuite.Server.Tests/TalentSuite.Server.Tests.csproj --configuration Release --no-restore -v minimal

      - name: Run slice tests
        run: dotnet test src/TalentSuite.SliceTests/TalentSuite.SliceTests.csproj --configuration Release --no-restore -v minimal
